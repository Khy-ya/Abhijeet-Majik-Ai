<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Universal AI Chat Interface</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gemini: {
                            lightBg: '#f0f4f9',
                            lightSidebar: '#f0f4f9',
                            darkBg: '#131314',
                            darkSidebar: '#1e1f20',
                            accent: '#1a73e8'
                        }
                    }
                }
            }
        }
    </script>
    <!-- Marked.js for Markdown Processing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Custom Base Styles to handle mobile viewport & layout quirks safely -->
    <style>
        /* Safe layout architecture preventing mobile viewport jumps */
        body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        /* Custom scrollbar styling */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(156, 163, 175, 0.3);
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(156, 163, 175, 0.5);
        }
        /* Ensure code blocks look premium */
        pre {
            background-color: rgba(0, 0, 0, 0.05);
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin: 0.75rem 0;
        }
        .dark pre {
            background-color: rgba(255, 255, 255, 0.05);
        }
        code {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 0.875rem;
        }
        /* Markdown internal spacing adjustments */
        .markdown-body p { margin-bottom: 0.75rem; }
        .markdown-body p:last-child { margin-bottom: 0; }
        .markdown-body ul, .markdown-body ol { margin-left: 1.25rem; margin-bottom: 0.75rem; list-style-type: disc; }
        .markdown-body ol { list-style-type: decimal; }
        /* Blinking cursor effect for active generation */
        .typing-cursor::after {
            content: '▊';
            animation: blink 1s steps(2, start) infinite;
        }
        @keyframes blink { to { visibility: hidden; } }
    </style>
</head>
<body class="bg-white dark:bg-gemini-darkBg text-gray-900 dark:text-gray-100 transition-colors duration-200">

    <!-- Fallback App Loader: Prevents white screen of death flash -->
    <div id="loading" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-white dark:bg-gemini-darkBg">
        <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-gray-600 dark:text-gray-400 font-medium">Initializing UI Engine...</p>
    </div>

    <!-- Main App Wrapper Layout Container -->
    <div id="app" class="hidden flex h-full w-full relative overflow-hidden" style="height: 100dvh;">
        
        <!-- Mobile Sidebar Backdrop Overlay -->
        <div id="sidebarOverlay" class="fixed inset-0 bg-black/40 z-20 hidden md:hidden transition-opacity duration-200 opacity-0"></div>

        <!-- Left Sidebar: Chat History Panel -->
        <aside id="sidebar" class="fixed md:static inset-y-0 left-0 w-72 bg-gemini-lightSidebar dark:bg-gemini-darkSidebar z-30 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col h-full border-r border-gray-200 dark:border-gray-800">
            <!-- Top Actions -->
            <div class="p-4 flex flex-col gap-2 flex-shrink-0">
                <button id="btnNewChat" class="w-full flex items-center gap-3 px-4 py-3 bg-gray-200/60 hover:bg-gray-200 dark:bg-gray-800 dark:hover:bg-gray-700/80 rounded-full font-medium transition text-sm">
                    <svg class="w-5 h-5 text-gray-600 dark:text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    New chat
                </button>
            </div>

            <!-- Scrollable Chat History List -->
            <div id="chatListContainer" class="flex-1 overflow-y-auto px-3 py-2 space-y-1 custom-scrollbar">
                <!-- Dynamically injected items go here -->
            </div>

            <!-- Footer Menu Actions -->
            <div class="p-4 border-t border-gray-200 dark:border-gray-800 flex flex-col gap-1 flex-shrink-0">
                <!-- Settings Button -->
                <button id="btnOpenSettings" class="w-full flex items-center gap-3 px-3 py-2.5 hover:bg-gray-200/50 dark:hover:bg-gray-800 rounded-lg text-sm transition text-left">
                    <svg class="w-5 h-5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    Settings
                </button>
                <!-- Dark Mode Button Toggle -->
                <button id="btnToggleTheme" class="w-full flex items-center gap-3 px-3 py-2.5 hover:bg-gray-200/50 dark:hover:bg-gray-800 rounded-lg text-sm transition text-left">
                    <svg id="themeIconSun" class="w-5 h-5 opacity-70 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M16.243 17.657l.707-.707M6.343 6.343l.707-.707M12 7a5 5 0 100 10 5 5 0 000-10z"/></svg>
                    <svg id="themeIconMoon" class="w-5 h-5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                    <span id="themeText">Dark theme</span>
                </button>
            </div>
        </aside>

        <!-- Main Workspace Area -->
        <main class="flex-1 flex flex-col h-full overflow-hidden relative bg-white dark:bg-gemini-darkBg">
            
            <!-- Global Interactive Header Context Bar -->
            <header class="h-14 flex items-center justify-between px-4 border-b border-gray-100 dark:border-gray-800 flex-shrink-0">
                <div class="flex items-center gap-2">
                    <button id="btnMobileMenu" class="md:hidden p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition" aria-label="Toggle Menu">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                    </button>
                    <span id="headerChatTitle" class="font-medium text-gray-700 dark:text-gray-300 max-w-[180px] sm:max-w-xs truncate">New Chat</span>
                </div>
                <div class="flex items-center gap-2 text-xs text-gray-400">
                    <span id="lblActiveModel" class="bg-gray-100 dark:bg-gray-800 px-2.5 py-1 rounded-full text-gray-600 dark:text-gray-400 truncate max-w-[120px] sm:max-w-none">deepseek-r1:free</span>
                </div>
            </header>

            <!-- Main Scrollable Chat Screen Content View -->
            <div id="chatViewport" class="flex-1 overflow-y-auto p-4 sm:p-6 space-y-6 custom-scrollbar flex flex-col">
                <!-- Welcome onboarding state container view -->
                <div id="emptyState" class="flex-1 flex flex-col items-center justify-center text-center max-w-xl mx-auto py-12">
                    <h1 class="text-4xl font-semibold tracking-tight mb-3 bg-gradient-to-r from-blue-600 via-purple-500 to-red-500 bg-clip-text text-transparent">Hello, Human</h1>
                    <p class="text-gray-500 dark:text-gray-400 text-sm sm:text-base leading-relaxed">How can I help you discover or create today? Start typing below to begin an adaptive session powered by OpenRouter.</p>
                </div>
                <!-- Dynamic Message components injected dynamically here -->
                <div id="messagesWrapper" class="space-y-6 w-full max-w-3xl mx-auto hidden"></div>
            </div>

            <!-- Sticky/Floating Action Input System Area Context -->
            <div class="p-4 bg-gradient-to-t from-white via-white to-transparent dark:from-gemini-darkBg dark:via-gemini-darkBg flex-shrink-0 w-full max-w-3xl mx-auto">
                <form id="chatForm" class="relative bg-gray-100 dark:bg-gray-800/80 rounded-2xl border border-transparent focus-within:border-gray-300 dark:focus-within:border-gray-700 transition shadow-sm">
                    <textarea id="txtMessageInput" rows="1" placeholder="Message interface..." class="w-full pl-4 pr-12 py-4 bg-transparent resize-none overflow-y-auto max-h-36 outline-none text-sm sm:text-base pr-14 custom-scrollbar text-gray-900 dark:text-gray-100 block placeholder-gray-400" style="min-height: 52px;"></textarea>
                    <div class="absolute right-2 bottom-2">
                        <button type="submit" id="btnSubmitMessage" class="p-2 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-300 dark:disabled:bg-gray-700 text-white rounded-xl transition flex items-center justify-center shadow-sm disabled:shadow-none" disabled>
                            <svg class="w-5 h-5 transform rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9-7-9-7v14z"/></svg>
                        </button>
                    </div>
                </form>
                <div class="text-[10px] sm:text-xs text-center text-gray-400 mt-2">
                    AI responses may contain inaccuracies. Please double check critical information.
                </div>
            </div>
        </main>
    </div>

    <!-- Modals Architecture Tier Structure Layer -->
    <!-- Settings Modal Layout Dialog Layout -->
    <div id="modalSettings" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 hidden opacity-0 transition-opacity duration-200">
        <div class="bg-white dark:bg-gemini-darkSidebar w-full max-w-md rounded-2xl shadow-xl overflow-hidden transform scale-95 transition-transform duration-200 flex flex-col max-h-[90vh]">
            <div class="px-6 py-4 border-b border-gray-100 dark:border-gray-800 flex justify-between items-center flex-shrink-0">
                <h3 class="font-semibold text-lg">System Settings</h3>
                <button id="btnCloseSettings" class="p-1 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="p-6 space-y-4 overflow-y-auto flex-1 custom-scrollbar">
                <!-- API Token Storage Field -->
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1.5">OpenRouter API Key</label>
                    <input type="password" id="cfgApiKey" placeholder="sk-or-..." class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl focus:border-blue-500 outline-none text-sm transition">
                </div>
                <!-- Model Configuration Variant -->
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1.5">Model Identifier</label>
                    <input type="text" id="cfgModel" placeholder="deepseek/deepseek-r1:free" class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl focus:border-blue-500 outline-none text-sm transition">
                </div>
                <!-- Global / Per Chat System Prompts Container System -->
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1.5">Global System Prompt Directive</label>
                    <textarea id="cfgSystemPrompt" rows="3" placeholder="You are a helpful AI assistant..." class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl focus:border-blue-500 outline-none text-sm resize-none custom-scrollbar transition"></textarea>
                </div>
            </div>
            <div class="px-6 py-4 bg-gray-50 dark:bg-gray-800/50 border-t border-gray-100 dark:border-gray-800 flex justify-end gap-2 flex-shrink-0">
                <button id="btnSaveSettings" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-xl text-sm transition shadow-sm">Save Options</button>
            </div>
        </div>
    </div>

    <!-- Execution Engine Script Block -->
    <script>
        (function() {
            'use strict';

            // DOM State Elements Cache Node Definitions
            const DOM = {
                loader: document.getElementById('loading'),
                app: document.getElementById('app'),
                sidebar: document.getElementById('sidebar'),
                sidebarOverlay: document.getElementById('sidebarOverlay'),
                chatListContainer: document.getElementById('chatListContainer'),
                headerChatTitle: document.getElementById('headerChatTitle'),
                lblActiveModel: document.getElementById('lblActiveModel'),
                chatViewport: document.getElementById('chatViewport'),
                emptyState: document.getElementById('emptyState'),
                messagesWrapper: document.getElementById('messagesWrapper'),
                chatForm: document.getElementById('chatForm'),
                txtMessageInput: document.getElementById('txtMessageInput'),
                btnSubmitMessage: document.getElementById('btnSubmitMessage'),
                btnMobileMenu: document.getElementById('btnMobileMenu'),
                btnNewChat: document.getElementById('btnNewChat'),
                btnOpenSettings: document.getElementById('btnOpenSettings'),
                btnCloseSettings: document.getElementById('btnCloseSettings'),
                btnSaveSettings: document.getElementById('btnSaveSettings'),
                btnToggleTheme: document.getElementById('btnToggleTheme'),
                themeIconSun: document.getElementById('themeIconSun'),
                themeIconMoon: document.getElementById('themeIconMoon'),
                themeText: document.getElementById('themeText'),
                modalSettings: document.getElementById('modalSettings'),
                cfgApiKey: document.getElementById('cfgApiKey'),
                cfgModel: document.getElementById('cfgModel'),
                cfgSystemPrompt: document.getElementById('cfgSystemPrompt')
            };

            // Internal Reactive Application Architecture Context
            const State = {
                theme: 'light',
                apiKey: '',
                model: 'deepseek/deepseek-r1:free',
                globalSystemPrompt: 'You are a highly skilled, adaptive, and analytical assistant layout processing tool.',
                chats: [], // Array items: { id, title, created, systemPrompt, messages: [{role, content, timestamp}] }
                activeChatId: null,
                isGenerating: false,
                abortController: null
            };

            // Initialize Application Routine Setup
            window.addEventListener('DOMContentLoaded', () => {
                initStorageAndState();
                initThemeUI();
                renderChatList();
                bindEventHandlers();
                setupTextareaAutoresize();
                
                // Safe Application Visibility Swap Routing
                if (DOM.loader) DOM.loader.style.display = 'none';
                if (DOM.app) DOM.app.classList.remove('hidden');
                
                // Visual layout adjustment
                adjustActiveViewportState();
            });

            // LocalStorage Defensive Sync Engine
            function initStorageAndState() {
                try {
                    State.theme = localStorage.getItem('chat_theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                    State.apiKey = localStorage.getItem('chat_api_key') || '';
                    State.model = localStorage.getItem('chat_model') || 'deepseek/deepseek-r1:free';
                    State.globalSystemPrompt = localStorage.getItem('chat_system_prompt') || State.globalSystemPrompt;
                    
                    const savedChats = localStorage.getItem('chat_sessions');
                    State.chats = savedChats ? JSON.parse(savedChats) : [];
                } catch (e) {
                    console.error("Storage Initialization Failure context fallback engaged", e);
                    State.chats = [];
                }

                // Hydrate setting values safely inside layout nodes
                DOM.cfgApiKey.value = State.apiKey;
                DOM.cfgModel.value = State.model;
                DOM.cfgSystemPrompt.value = State.globalSystemPrompt;
                DOM.lblActiveModel.textContent = State.model.split('/').pop();

                // Load active chat workspace structure strategy
                if (State.chats.length > 0) {
                    State.activeChatId = State.chats[0].id;
                } else {
                    createNewChatSession();
                }
            }

            // Theme Application Layout Context Driver Engine
            function initThemeUI() {
                if (State.theme === 'dark') {
                    document.documentElement.classList.add('dark');
                    DOM.themeIconSun.classList.remove('hidden');
                    DOM.themeIconMoon.classList.add('hidden');
                    DOM.themeText.textContent = "Light theme";
                } else {
                    document.documentElement.classList.remove('dark');
                    DOM.themeIconSun.classList.add('hidden');
                    DOM.themeIconMoon.classList.remove('hidden');
                    DOM.themeText.textContent = "Dark theme";
                }
            }

            function toggleThemeContext() {
                State.theme = State.theme === 'dark' ? 'light' : 'dark';
                localStorage.setItem('chat_theme', State.theme);
                initThemeUI();
            }

            // Multi-Chat Architecture Logic Controller Layer
            function createNewChatSession() {
                const newId = 'chat_' + Date.now();
                const newSession = {
                    id: newId,
                    title: 'New Chat',
                    created: Date.now(),
                    systemPrompt: State.globalSystemPrompt,
                    messages: []
                };
                State.chats.unshift(newSession);
                State.activeChatId = newId;
                saveChatsToStorage();
                renderChatList();
                adjustActiveViewportState();
            }

            function saveChatsToStorage() {
                try {
                    localStorage.setItem('chat_sessions', JSON.stringify(State.chats));
                } catch(e) {
                    console.error("Critical State Persistence Exception Handler Triggered", e);
                }
            }

            function selectActiveChatContext(id) {
                if (State.isGenerating) return; // Prevent navigation during standard asynchronous data collection cycles
                State.activeChatId = id;
                renderChatList();
                adjustActiveViewportState();
                closeSidebarMobile();
            }

            function deleteChatSession(id, event) {
                if (event) event.stopPropagation();
                if (State.isGenerating && State.activeChatId === id) return;
                
                State.chats = State.chats.filter(c => c.id !== id);
                saveChatsToStorage();
                
                if (State.activeChatId === id) {
                    if (State.chats.length > 0) {
                        State.activeChatId = State.chats[0].id;
                    } else {
                        createNewChatSession();
                        return;
                    }
                }
                renderChatList();
                adjustActiveViewportState();
            }

            function renameChatSessionPrompt(id, event) {
                if (event) event.stopPropagation();
                const targetChat = State.chats.find(c => c.id === id);
                if (!targetChat) return;

                const currentName = targetChat.title;
                const newName = prompt("Rename this chat thread conversation parameter input:", currentName);
                if (newName && newName.trim() !== '') {
                    targetChat.title = newName.trim();
                    saveChatsToStorage();
                    renderChatList();
                    if (State.activeChatId === id) {
                        DOM.headerChatTitle.textContent = targetChat.title;
                    }
                }
            }

            // UI View Engine Core Render Processing Layer
            function renderChatList() {
                DOM.chatListContainer.innerHTML = '';
                if (State.chats.length === 0) return;

                State.chats.forEach(chat => {
                    const isActive = chat.id === State.activeChatId;
                    
                    // Container Node Building Mechanics Strategy
                    const item = document.createElement('div');
                    item.className = `group flex items-center justify-between px-3 py-2.5 rounded-lg text-sm font-medium transition cursor-pointer select-none ${isActive ? 'bg-gray-200 dark:bg-gray-800 text-gray-900 dark:text-gray-100' : 'text-gray-600 dark:text-gray-400 hover:bg-gray-200/40 dark:hover:bg-gray-800/40'}`;
                    item.onclick = () => selectActiveChatContext(chat.id);

                    // Title Text Content Wrap Layout Element Context
                    const titleWrap = document.createElement('div');
                    titleWrap.className = 'flex items-center gap-2.5 truncate flex-1 pr-2';
                    titleWrap.innerHTML = `
                        <svg class="w-4 h-4 opacity-70 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                        <span class="truncate pr-1">${escapeHTML(chat.title)}</span>
                    `;
                    item.appendChild(titleWrap);

                    // Management Tool Box Layout Container Controls Trigger Layer Array Node
                    const actionContainer = document.createElement('div');
                    actionContainer.className = `flex items-center gap-1 opacity-0 group-hover:opacity-100 focus-within:opacity-100 transition-opacity ${isActive ? 'opacity-100' : ''}`;

                    // Edit Parameter Handle Action Button Layout Node Element
                    const btnEdit = document.createElement('button');
                    btnEdit.className = 'p-1 hover:bg-gray-300 dark:hover:bg-gray-700 rounded transition text-gray-500 hover:text-gray-700 dark:hover:text-gray-300';
                    btnEdit.innerHTML = `<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>`;
                    btnEdit.onclick = (e) => renameChatSessionPrompt(chat.id, e);
                    actionContainer.appendChild(btnEdit);

                    // Erase Delete Processing Button Element Layer
                    const btnDel = document.createElement('button');
                    btnDel.className = 'p-1 hover:bg-gray-300 dark:hover:bg-gray-700 rounded transition text-gray-500 hover:text-red-500';
                    btnDel.innerHTML = `<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>`;
                    btnDel.onclick = (e) => deleteChatSession(chat.id, e);
                    actionContainer.appendChild(btnDel);

                    item.appendChild(actionContainer);
                    DOM.chatListContainer.appendChild(item);
                });
            }

            function adjustActiveViewportState() {
                const chat = State.chats.find(c => c.id === State.activeChatId);
                if (!chat) return;

                DOM.headerChatTitle.textContent = chat.title;

                if (chat.messages.length === 0) {
                    DOM.emptyState.classList.remove('hidden');
                    DOM.messagesWrapper.classList.add('hidden');
                    DOM.messagesWrapper.innerHTML = '';
                } else {
                    DOM.emptyState.classList.add('hidden');
                    DOM.messagesWrapper.classList.remove('hidden');
                    DOM.messagesWrapper.innerHTML = '';
                    
                    chat.messages.forEach(msg => {
                        appendMessageNodeToLayoutView(msg.role, msg.content, false);
                    });
                    scrollToBottomTargetLayoutView();
                }
            }

            function appendMessageNodeToLayoutView(role, content, isLiveGenerating = false) {
                const isUser = role === 'user';
                
                // Construct standard system container dynamic layouts
                const row = document.createElement('div');
                row.className = `flex w-full space-x-3 max-w-3xl mx-auto ${isUser ? 'justify-end' : 'justify-start'}`;

                // Avatar Icon Architecture Graphic Assembly Unit Block
                const avatar = document.createElement('div');
                avatar.className = `w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0 font-bold text-xs select-none ${isUser ? 'bg-blue-600 text-white order-2 ml-3' : 'bg-purple-600 text-white mr-3'}`;
                avatar.textContent = isUser ? 'U' : 'AI';

                const bubble = document.createElement('div');
                bubble.className = `max-w-[85%] sm:max-w-[75%] px-4 py-2.5 rounded-2xl text-sm sm:text-base leading-relaxed overflow-hidden ${
                    isUser 
                        ? 'bg-blue-600 text-white rounded-br-none shadow-sm' 
                        : 'bg-gray-100 dark:bg-gray-800 text-gray-900 dark:text-gray-100 rounded-bl-none border border-gray-200/20 dark:border-gray-700/30'
                }`;

                // Set dynamic parsing parameters strategy logic tier container
                if (isUser) {
                    bubble.textContent = content;
                } else {
                    bubble.className += ' markdown-body';
                    if (isLiveGenerating) {
                        bubble.className += ' typing-cursor';
                    }
                    // Prevent markdown engine explosion loops processing raw strings
                    try {
                        bubble.innerHTML = marked.parse(content || '');
                    } catch(e) {
                        bubble.textContent = content;
                    }
                }

                row.appendChild(avatar);
                row.appendChild(bubble);
                
                if (isLiveGenerating && !isUser) {
                    // Cache the generating node element context to adjust text parameters dynamically down stream execution cycles
                    row.id = 'live-generating-node-element';
                }

                DOM.messagesWrapper.appendChild(row);
                DOM.emptyState.classList.add('hidden');
                DOM.messagesWrapper.classList.remove('hidden');
            }

            // Real-time Asynchronous Streaming Communication OpenRouter Bridge Processing Engine
            async function handleSendMessageSubmission(event) {
                if (event) event.preventDefault();
                if (State.isGenerating) return;

                const queryText = DOM.txtMessageInput.value.trim();
                if (!queryText) return;

                // Enforce authorization guard thresholds safely
                if (!State.apiKey) {
                    alert("System API Authentication key missing. Please insert target credentials in the system settings tray panel mechanism to proceed.");
                    openSettingsModalContext();
                    return;
                }

                const currentChat = State.chats.find(c => c.id === State.activeChatId);
                if (!currentChat) return;

                // UI Cleanup Initialization cycles
                DOM.txtMessageInput.value = '';
                DOM.txtMessageInput.style.height = 'auto';
                DOM.btnSubmitMessage.disabled = true;

                // Push User Payload to structures
                const userMsg = { role: 'user', content: queryText, timestamp: Date.now() };
                currentChat.messages.push(userMsg);
                
                // Dynamic Title adjustment if thread was brand new text
                if (currentChat.title === 'New Chat' && currentChat.messages.length === 1) {
                    currentChat.title = queryText.length > 24 ? queryText.slice(0, 24) + '...' : queryText;
                    renderChatList();
                    DOM.headerChatTitle.textContent = currentChat.title;
                }

                saveChatsToStorage();
                appendMessageNodeToLayoutView('user', queryText, false);
                scrollToBottomTargetLayoutView();

                // Build context history pipeline structure stack payloads
                const apiPayloadMessages = [];
                if (currentChat.systemPrompt && currentChat.systemPrompt.trim() !== '') {
                    apiPayloadMessages.push({ role: 'system', content: currentChat.systemPrompt.trim() });
                }
                
                // Collate history payload strings up to context maximum boundary requirements safely
                currentChat.messages.forEach(m => {
                    apiPayloadMessages.push({ role: m.role, content: m.content });
                });

                // Establish Async Execution Block Processing Constraints Strategy
                State.isGenerating = true;
                State.abortController = new AbortController();

                // Append initial visual container placeholder node for upcoming streaming buffers
                appendMessageNodeToLayoutView('assistant', '', true);
                scrollToBottomTargetLayoutView();

                const liveNodeRow = document.getElementById('live-generating-node-element');
                const liveTextBubble = liveNodeRow ? liveNodeRow.querySelector('.markdown-body') : null;

                let completeAIResponseAccumulator = '';

                try {
                    const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${State.apiKey}`,
                            'Content-Type': 'application/json',
                            'HTTP-Referer': window.location.origin,
                            'X-Title': 'Universal AI Chat UI'
                        },
                        body: JSON.stringify({
                            model: State.model,
                            messages: apiPayloadMessages,
                            stream: true
                        }),
                        signal: State.abortController.signal
                    });

                    if (!response.ok) {
                        const errorDetailsText = await response.text();
                        throw new Error(`HTTP Endpoint Fault Status Code: ${response.status} - Content: ${errorDetailsText}`);
                    }

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder('utf-8');
                    let streamBufferChunk = '';

                    while (true) {
                        const { value, done } = await reader.read();
                        if (done) break;

                        streamBufferChunk += decoder.decode(value, { stream: true });
                        const linesArray = streamBufferChunk.split('\n');
                        
                        // Preserve trailing partial fragment lines back to the stream buffer matrix pool
                        streamBufferChunk = linesArray.pop() || '';

                        for (const line string of linesArray) {
                            const standardCleanedLine = line.trim();
                            if (!standardCleanedLine) continue;
                            if (standardCleanedLine === 'data: [DONE]') break;

                            if (standardCleanedLine.startsWith('data: ')) {
                                const parseableJsonString = standardCleanedLine.slice(6);
                                try {
                                    const parsedChunkPayload = JSON.parse(parseableJsonString);
                                    const incrementalTextToken = parsedChunkPayload.choices?.[0]?.delta?.content || '';
                                    if (incrementalTextToken) {
                                        completeAIResponseAccumulator += incrementalTextToken;
                                        if (liveTextBubble) {
                                            liveTextBubble.innerHTML = marked.parse(completeAIResponseAccumulator);
                                        }
                                        scrollToBottomTargetLayoutView();
                                    }
                                } catch(err) {
                                    // Soft intercept on partial JSON transmission line drops
                                    console.warn("JSON Streaming processing syntax skip tracking node exception:", err);
                                }
                            }
                        }
                    }

                    // Catch standard cleanup buffers if elements exist safely
                    if (streamBufferChunk.startsWith('data: ')) {
                         try {
                            const parsedChunkPayload = JSON.parse(streamBufferChunk.slice(6));
                            const incrementalTextToken = parsedChunkPayload.choices?.[0]?.delta?.content || '';
                            if (incrementalTextToken) {
                                completeAIResponseAccumulator += incrementalTextToken;
                            }
                         } catch(e){}
                    }

                } catch (apiExecutionError) {
                    console.error("Critical Stream API Failure:", apiExecutionError);
                    if (apiExecutionError.name === 'AbortError') {
                        completeAIResponseAccumulator += '\n\n*[Data generation stream transfer cycle halted by operator instruction]*';
                    } else {
                        completeAIResponseAccumulator += `\n\n**Engine Sync Exception Intercept:** ${apiExecutionError.message || 'Unknown stream network loop disruption context error occurred.'}`;
                    }
                    if (liveTextBubble) {
                        liveTextBubble.innerHTML = marked.parse(completeAIResponseAccumulator);
                    }
                } finally {
                    // Safe cleanup transition phases processing structural adjustments
                    State.isGenerating = false;
                    State.abortController = null;
                    if (liveNodeRow) {
                        liveNodeRow.removeAttribute('id');
                        if (liveTextBubble) {
                            liveTextBubble.classList.remove('typing-cursor');
                        }
                    }

                    // Log execution context block payloads back into local state matrix storage channels
                    if (completeAIResponseAccumulator.trim() !== '') {
                        currentChat.messages.push({
                            role: 'assistant',
                            content: completeAIResponseAccumulator,
                            timestamp: Date.now()
                        });
                        saveChatsToStorage();
                    }
                    
                    evaluateInputValidationState();
                }
            }

            // Interface Control Elements Binding & Architecture Wiring Layer Routine
            function bindEventHandlers() {
                DOM.chatForm.onsubmit = handleSendMessageSubmission;
                DOM.btnNewChat.onclick = createNewChatSession;
                DOM.btnToggleTheme.onclick = toggleThemeContext;

                // Settings Navigation Architecture Event Wireups
                DOM.btnOpenSettings.onclick = openSettingsModalContext;
                DOM.btnCloseSettings.onclick = closeSettingsModalContext;
                DOM.btnSaveSettings.onclick = commitSettingsChangesToStorage;

                // Mobile Panel Sidebar Controls Trigger Layout Layer Mapping
                DOM.btnMobileMenu.onclick = openSidebarMobile;
                DOM.sidebarOverlay.onclick = closeSidebarMobile;

                // Textarea Validation Processing Wireup Input Tracking Loop
                DOM.txtMessageInput.addEventListener('input', () => {
                    evaluateInputValidationState();
                });

                // Hotkey listener integration intercept setups
                DOM.txtMessageInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey && window.innerWidth > 768) {
                        e.preventDefault();
                        if (!DOM.btnSubmitMessage.disabled) {
                            handleSendMessageSubmission();
                        }
                    }
                });
            }

            function evaluateInputValidationState() {
                const textVal = DOM.txtMessageInput.value.trim();
                DOM.btnSubmitMessage.disabled = (textVal === '' || State.isGenerating);
            }

            function openSidebarMobile() {
                DOM.sidebar.classList.remove('-translate-x-full');
                DOM.sidebarOverlay.classList.remove('hidden');
                setTimeout(() => {
                    DOM.sidebarOverlay.classList.add('opacity-100');
                }, 10);
            }

            function closeSidebarMobile() {
                DOM.sidebar.classList.add('-translate-x-full');
                DOM.sidebarOverlay.classList.remove('opacity-100');
                setTimeout(() => {
                    DOM.sidebarOverlay.classList.add('hidden');
                }, 200);
            }

            function openSettingsModalContext() {
                DOM.modalSettings.classList.remove('hidden');
                setTimeout(() => {
                    DOM.modalSettings.classList.remove('opacity-0');
                    DOM.modalSettings.querySelector('.transform').classList.remove('scale-95');
                }, 10);
            }

            function closeSettingsModalContext() {
                DOM.modalSettings.classList.add('opacity-0');
                DOM.modalSettings.querySelector('.transform').classList.add('scale-95');
                setTimeout(() => {
                    DOM.modalSettings.classList.add('hidden');
                }, 200);
            }

            function commitSettingsChangesToStorage() {
                const incomingKey = DOM.cfgApiKey.value.trim();
                const incomingModel = DOM.cfgModel.value.trim() || 'deepseek/deepseek-r1:free';
                const incomingPrompt = DOM.cfgSystemPrompt.value.trim();

                State.apiKey = incomingKey;
                State.model = incomingModel;
                State.globalSystemPrompt = incomingPrompt;

                localStorage.setItem('chat_api_key', incomingKey);
                localStorage.setItem('chat_model', incomingModel);
                localStorage.setItem('chat_system_prompt', incomingPrompt);

                DOM.lblActiveModel.textContent = incomingModel.split('/').pop();

                // If active workspace is brand new without messages update its context prompt structure inline dynamically
                const currentChat = State.chats.find(c => c.id === State.activeChatId);
                if (currentChat && currentChat.messages.length === 0) {
                    currentChat.systemPrompt = incomingPrompt;
                    saveChatsToStorage();
                }

                closeSettingsModalContext();
            }

            function setupTextareaAutoresize() {
                const txtarea = DOM.txtMessageInput;
                txtarea.addEventListener('input', function() {
                    this.style.height = 'auto';
                    this.style.height = (this.scrollHeight) + 'px';
                });
            }

            function scrollToBottomTargetLayoutView() {
                // Defensive scrolling strategy wrapper executing on layout paint ticks
                requestAnimationFrame(() => {
                    DOM.chatViewport.scrollTop = DOM.chatViewport.scrollHeight;
                });
            }

            // Utilities Security Helpers
            function escapeHTML(str) {
                if (!str) return '';
                return str.replace(/[&<>"']/g, function(match) {
                    const mask = {
                        '&': '&amp;',
                        '<': '&lt;',
                        '>': '&gt;',
                        '"': '&quot;',
                        "'": '&#039;'
                    };
                    return mask[match];
                });
            }

        })();
    </script>
</body>
</html>
