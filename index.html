<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Abhi's AI - Robotics Workspace</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Marked.js for Markdown Rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // Tailwind Custom Configuration for "Work & Busy Robotics" Theme
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        bot: {
                            lightBg: '#f8fafc',
                            darkBg: '#0f172a',
                            lightPanel: '#ffffff',
                            darkPanel: '#1e293b',
                            industrial: '#f59e0b', // Industrial Orange
                            steel: '#64748b' // Steel Blue Gray
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar configurations for a clean look */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #475569;
        }
        /* Markdown overrides for layout injection safety */
        .prose pre {
            background-color: #1e293b;
            color: #f8fafc;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin: 0.5rem 0;
        }
        .dark .prose pre {
            background-color: #0f172a;
        }
        .prose code {
            font-family: monospace;
            font-size: 0.875rem;
        }
        .prose p { margin-bottom: 0.75rem; }
        .prose ul { list-style-type: disc; margin-left: 1.25rem; margin-bottom: 0.75rem; }
        .prose ol { list-style-type: decimal; margin-left: 1.25rem; margin-bottom: 0.75rem; }
        /* Keyboard safe layout helper */
        body {
            min-height: 100vh;
            min-height: -webkit-fill-available;
        }
        html {
            height: -webkit-fill-available;
        }
    </style>
</head>
<body class="bg-bot-lightBg dark:bg-bot-darkBg text-slate-800 dark:text-slate-100 font-sans transition-colors duration-200 flex flex-col antialiased">

    <!-- CRITICAL SCRIPT SAFETY: Fallback Initializing Loader -->
    <div id="loading-screen" class="fixed inset-0 z-[100] flex flex-col items-center justify-content-center bg-slate-900 text-white gap-4 flex justify-center items-center">
        <div class="w-12 h-12 border-4 border-amber-500 border-t-transparent rounded-full animate-spin"></div>
        <div class="text-lg font-mono tracking-widest text-amber-500">INITIALIZING ROBOTIC CORE...</div>
    </div>

    <!-- MAIN APP WRAPPER (Hidden until JS mounts safely) -->
    <div id="app-root" class="hidden flex flex-1 overflow-hidden relative w-full h-full">
        
        <!-- SIDEBAR (Left Panel) -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-72 bg-white dark:bg-bot-darkPanel border-r border-slate-200 dark:border-slate-700 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col">
            <!-- Sidebar Header -->
            <div class="p-4 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-amber-500 animate-pulse"></div>
                    <span class="font-mono font-bold tracking-wider text-sm text-slate-500 dark:text-slate-400">SYS_STATUS: ACTIVE</span>
                </div>
                <button onclick="toggleSidebar()" class="md:hidden p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>

            <!-- New Chat Action Button -->
            <div class="p-4">
                <button onclick="createNewChat()" class="w-full flex items-center justify-center gap-2 py-3 px-4 rounded-xl bg-amber-500 hover:bg-amber-600 dark:bg-amber-600 dark:hover:bg-amber-700 text-white font-medium shadow-sm transition-all duration-150 group">
                    <svg class="w-5 h-5 transition-transform group-hover:rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    Assemble New Task
                </button>
            </div>

            <!-- Chat History Area -->
            <div class="flex-1 overflow-y-auto px-3 space-y-1 custom-scrollbar" id="chat-history-list">
                <!-- Dynamically Rendered History Strips Go Here -->
            </div>

            <!-- Sidebar Bottom Configuration Panel -->
            <div class="p-4 border-t border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 space-y-2">
                <button onclick="openModal('settings-modal')" class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 dark:text-slate-300 hover:bg-slate-200/60 dark:hover:bg-slate-700/60 transition-colors text-sm">
                    <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    Engine Settings
                </button>
                <button onclick="toggleDarkMode()" class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 dark:text-slate-300 hover:bg-slate-200/60 dark:hover:bg-slate-700/60 transition-colors text-sm">
                    <svg id="dark-mode-icon" class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                    <span id="dark-mode-text">Toggle Night Shift</span>
                </button>
            </div>
        </aside>

        <!-- BACKDROP FOR MOBILE SIDEBAR -->
        <div id="sidebar-backdrop" onclick="toggleSidebar()" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-30 hidden md:hidden transition-opacity duration-300"></div>

        <!-- MAIN WORKSPACE CONTAINER -->
        <main class="flex-1 md:pl-72 flex flex-col h-full relative">
            
            <!-- APPLICATION VIEWPORT TOP BAR -->
            <header class="h-16 border-b border-slate-200 dark:border-slate-700 bg-white/80 dark:bg-bot-darkPanel/80 backdrop-blur-md flex items-center justify-between px-4 sticky top-0 z-20">
                <div class="flex items-center gap-3">
                    <button onclick="toggleSidebar()" class="md:hidden p-2 rounded-xl border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-300">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                    </button>
                    <div>
                        <h1 class="font-mono font-black text-xl tracking-tight text-slate-900 dark:text-white flex items-center gap-2">
                            Abhi's AI <span class="text-xs py-0.5 px-1.5 bg-amber-500/10 text-amber-600 dark:text-amber-400 border border-amber-500/20 rounded-md uppercase tracking-widest font-bold font-mono">v4.1</span>
                        </h1>
                    </div>
                </div>
                
                <div class="flex items-center gap-2">
                    <button onclick="openModal('prompt-modal')" class="p-2 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg text-sm font-mono flex items-center gap-1.5 border border-slate-200 dark:border-slate-700 px-3 py-1.5">
                        <svg class="w-4 h-4 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                        <span>System Prompt</span>
                    </button>
                </div>
            </header>

            <!-- CHAT VIEWPORT LAYER -->
            <div id="chat-viewport" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 custom-scrollbar pb-36">
                <!-- Message Nodes are dynamic entries inside this container -->
            </div>

            <!-- FLOATING INPUT INTERFACE ARCHITECTURE -->
            <div class="absolute bottom-0 inset-x-0 bg-gradient-to-t from-bot-lightBg via-bot-lightBg/95 to-transparent dark:from-bot-darkBg dark:via-bot-darkBg/95 p-4 md:p-6 z-10">
                <div class="max-w-3xl mx-auto relative">
                    <div class="bg-white dark:bg-bot-darkPanel border border-slate-200 dark:border-slate-700/80 rounded-2xl shadow-xl focus-within:ring-2 focus-within:ring-amber-500/50 transition-all overflow-hidden">
                        <textarea id="chat-input" rows="1" placeholder="Issue execution directive or operational question..." class="w-full bg-transparent px-4 py-4 pr-16 text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none resize-none custom-scrollbar min-h-[56px] max-h-[200px]" oninput="autoGrowInput(this)" onkeydown="handleInputKeydown(event)"></textarea>
                        
                        <div class="absolute right-3 bottom-3 flex items-center gap-2">
                            <button id="send-btn" onclick="submitMessage()" class="p-2.5 bg-amber-500 hover:bg-amber-600 text-white rounded-xl transition-all shadow-md active:scale-95 disabled:opacity-40 disabled:pointer-events-none" disabled>
                                <svg class="w-5 h-5 transform rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                            </button>
                        </div>
                    </div>
                    <p class="text-center text-[11px] font-mono text-slate-400 dark:text-slate-500 mt-2">
                        Engine Active: <span id="active-model-lbl">deepseek/deepseek-r1:free</span> • Directives processed in global environments.
                    </p>
                </div>
            </div>
        </main>
    </div>

    <!-- MODAL ARCHITECTURE WRAPPERS -->
    <!-- 1. Engine Configuration Modal -->
    <div id="settings-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white dark:bg-bot-darkPanel border border-slate-200 dark:border-slate-700 rounded-2xl max-w-md w-full p-6 shadow-2xl transition-all transform scale-95 opacity-0 duration-200" id="settings-modal-content">
            <h3 class="text-lg font-mono font-bold border-b border-slate-100 dark:border-slate-700 pb-3 mb-4 text-slate-900 dark:text-white flex items-center gap-2">
                <span class="w-2.5 h-2.5 bg-amber-500 rounded-full"></span> ENGINE PARAMETERS
            </h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-mono font-bold uppercase tracking-wider text-slate-400 mb-1">OpenRouter Access Key</label>
                    <input type="password" id="setting-api-key" placeholder="sk-or-..." class="w-full px-3 py-2 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg text-sm text-slate-900 dark:text-white focus:outline-none focus:border-amber-500">
                </div>
                <div>
                    <label class="block text-xs font-mono font-bold uppercase tracking-wider text-slate-400 mb-1">Target Processing Model</label>
                    <input type="text" id="setting-model" placeholder="deepseek/deepseek-r1:free" class="w-full px-3 py-2 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg text-sm text-slate-900 dark:text-white focus:outline-none focus:border-amber-500">
                </div>
            </div>
            <div class="mt-6 flex justify-end gap-2">
                <button onclick="closeModal('settings-modal')" class="px-4 py-2 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-400 rounded-lg text-sm font-medium hover:bg-slate-50 dark:hover:bg-slate-800">Abort</button>
                <button onclick="saveSettings()" class="px-4 py-2 bg-amber-500 hover:bg-amber-600 text-white rounded-lg text-sm font-medium shadow-sm">Commit Changes</button>
            </div>
        </div>
    </div>

    <!-- 2. Global System Prompt Modifier Modal -->
    <div id="prompt-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white dark:bg-bot-darkPanel border border-slate-200 dark:border-slate-700 rounded-2xl max-w-lg w-full p-6 shadow-2xl transition-all transform scale-95 opacity-0 duration-200" id="prompt-modal-content">
            <h3 class="text-lg font-mono font-bold border-b border-slate-100 dark:border-slate-700 pb-3 mb-4 text-slate-900 dark:text-white">CORE OPERATING LOGIC</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-mono font-bold uppercase tracking-wider text-slate-400 mb-1">Global System Directives Matrix</label>
                    <textarea id="setting-system-prompt" rows="5" placeholder="Define boundaries, behavior matrix constraints..." class="w-full px-3 py-2 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg text-sm text-slate-900 dark:text-white focus:outline-none focus:border-amber-500 custom-scrollbar resize-none"></textarea>
                </div>
            </div>
            <div class="mt-6 flex justify-end gap-2">
                <button onclick="closeModal('prompt-modal')" class="px-4 py-2 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-400 rounded-lg text-sm font-medium hover:bg-slate-50 dark:hover:bg-slate-800">Abort</button>
                <button onclick="saveSystemPrompt()" class="px-4 py-2 bg-amber-500 hover:bg-amber-600 text-white rounded-lg text-sm font-medium shadow-sm">Inject Logic</button>
            </div>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- CRITICAL TECH SAFETY PLACEMENT: SCRIPT TAG -->
    <!-- ========================================== -->
    <script>
        // State Engineering Object Engine
        let state = {
            chats: [],
            activeChatId: null,
            apiKey: '',
            model: 'deepseek/deepseek-r1:free',
            systemPrompt: 'You are Abhi\'s AI, a hyper-focused, incredibly efficient mechanical operative assistant working inside a busy corporate robotics production workspace. Your style is modern, technical, crisp, highly industrious, slightly robotic yet immensely helpful, optimized for heavy workflows and engineering tasks.',
            darkMode: false,
            sidebarOpen: false
        };

        // Welcome Interface Factory Configurator
        const WELCOME_MESSAGE = `### 🦾 Core Engine Operational: Abhi's AI Online

Welcome to the **Robotics & Work Workspace Layer**. System diagnostic protocols verify all systems nominal. 

I am processing inside a high-output workspace mode. Ready to ingest your architectural directives, code requirements, or computational problems. 

**Available Mechanical Actions:**
*   **System Prompt Customization:** Fine-tune my behaviors matrix via the top-bar button.
*   **Engine Tuning:** Alter targeted OpenRouter processing targets in the configuration portal.

*Standing by for instruction input down-link...*`;

        // Deep-Safeguard Application Initializer Mount
        window.addEventListener('DOMContentLoaded', () => {
            try {
                // Read State Layer
                state.apiKey = localStorage.getItem('abhi_ai_api_key') || '';
                state.model = localStorage.getItem('abhi_ai_model') || 'deepseek/deepseek-r1:free';
                state.systemPrompt = localStorage.getItem('abhi_ai_system_prompt') || state.systemPrompt;
                state.darkMode = localStorage.getItem('abhi_ai_dark_mode') === 'true';
                
                try {
                    const savedChats = localStorage.getItem('abhi_ai_chats');
                    state.chats = savedChats ? JSON.parse(savedChats) : [];
                } catch (e) {
                    console.error("Corrupted history segment detected. Purging stack.", e);
                    state.chats = [];
                }

                // Apply Viewport Dark Settings Mode
                if (state.darkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }

                // Synchronize Inputs Fields
                document.getElementById('setting-api-key').value = state.apiKey;
                document.getElementById('setting-model').value = state.model;
                document.getElementById('setting-system-prompt').value = state.systemPrompt;
                document.getElementById('active-model-lbl').textContent = state.model;
                
                updateInputState();

                // Build Default Session Stack if zero states found
                if (state.chats.length === 0) {
                    createNewChat();
                } else {
                    state.activeChatId = state.chats[0].id;
                    renderSidebarHistory();
                    renderActiveChatMessages();
                }

                // SAFE DISMISSAL OF LAUNCH SCREEN LAYER
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('app-root').classList.remove('hidden');
            } catch (fatalInitError) {
                document.getElementById('loading-screen').innerHTML = `
                    <div class="text-red-500 font-mono text-center p-6">
                        <h2 class="text-xl font-bold mb-2">SYSTEM INITIALIZATION FAILURE</h2>
                        <p class="text-sm">${fatalInitError.toString()}</p>
                    </div>
                `;
            }
        });

        // Dynamic State UI Sync Handlers
        function updateInputState() {
            const input = document.getElementById('chat-input');
            const btn = document.getElementById('send-btn');
            if(input.value.trim().length > 0) {
                btn.removeAttribute('disabled');
            } else {
                btn.setAttribute('disabled', 'true');
            }
        }

        function autoGrowInput(element) {
            element.style.height = 'auto';
            element.style.height = element.scrollHeight + 'px';
            updateInputState();
        }

        function handleInputKeydown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                submitMessage();
            }
        }

        // Operational Modals Controller Layer
        function openModal(modalId) {
            const el = document.getElementById(modalId);
            const content = document.getElementById(`${modalId}-content`);
            el.classList.remove('hidden');
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 50);
        }

        function closeModal(modalId) {
            const el = document.getElementById(modalId);
            const content = document.getElementById(`${modalId}-content`);
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => el.classList.add('hidden'), 200);
        }

        function saveSettings() {
            state.apiKey = document.getElementById('setting-api-key').value.trim();
            state.model = document.getElementById('setting-model').value.trim() || 'deepseek/deepseek-r1:free';
            localStorage.setItem('abhi_ai_api_key', state.apiKey);
            localStorage.setItem('abhi_ai_model', state.model);
            document.getElementById('active-model-lbl').textContent = state.model;
            closeModal('settings-modal');
        }

        function saveSystemPrompt() {
            state.systemPrompt = document.getElementById('setting-system-prompt').value.trim();
            localStorage.setItem('abhi_ai_system_prompt', state.systemPrompt);
            closeModal('prompt-modal');
        }

        function toggleDarkMode() {
            state.darkMode = !state.darkMode;
            localStorage.setItem('abhi_ai_dark_mode', state.darkMode);
            if(state.darkMode) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
            // Update Icon UI System
            const icon = document.getElementById('dark-mode-icon');
            if(state.darkMode) {
                icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M16.243 17.657l.707.707M6.343 6.343l.707-.707M14.5 12a2.5 2.5 0 11-5 0 2.5 2.5 0 015 0z"/>`;
            } else {
                icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>`;
            }
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const backdrop = document.getElementById('sidebar-backdrop');
            if (state.sidebarOpen) {
                sidebar.classList.add('-translate-x-full');
                backdrop.classList.add('hidden');
                state.sidebarOpen = false;
            } else {
                sidebar.classList.remove('-translate-x-full');
                backdrop.classList.remove('hidden');
                state.sidebarOpen = true;
            }
        }

        // Structural Chat Memory Engine Management
        function createNewChat() {
            const newChat = {
                id: 'chat_' + Date.now(),
                title: 'New Directive Module',
                messages: [
                    { role: 'assistant', content: WELCOME_MESSAGE }
                ]
            };
            state.chats.unshift(newChat);
            state.activeChatId = newChat.id;
            saveChatsToStorage();
            renderSidebarHistory();
            renderActiveChatMessages();
            if(state.sidebarOpen) toggleSidebar();
        }

        function selectChat(id) {
            state.activeChatId = id;
            renderSidebarHistory();
            renderActiveChatMessages();
            if(state.sidebarOpen) toggleSidebar();
        }

        function deleteChat(id, event) {
            event.stopPropagation();
            state.chats = state.chats.filter(c => c.id !== id);
            if (state.chats.length === 0) {
                createNewChat();
            } else if (state.activeChatId === id) {
                state.activeChatId = state.chats[0].id;
            }
            saveChatsToStorage();
            renderSidebarHistory();
            renderActiveChatMessages();
        }

        function renameChatPrompt(id, event) {
            event.stopPropagation();
            const targetChat = state.chats.find(c => c.id === id);
            if (!targetChat) return;
            const newTitle = prompt("Update operational module name tag:", targetChat.title);
            if(newTitle && newTitle.trim().length > 0) {
                targetChat.title = newTitle.trim();
                saveChatsToStorage();
                renderSidebarHistory();
            }
        }

        function saveChatsToStorage() {
            localStorage.setItem('abhi_ai_chats', JSON.stringify(state.chats));
        }

        // UI Pipeline Component Renders
        function renderSidebarHistory() {
            const container = document.getElementById('chat-history-list');
            container.innerHTML = '';

            state.chats.forEach(chat => {
                const isActive = chat.id === state.activeChatId;
                const activeClasses = isActive 
                    ? 'bg-amber-500/10 text-amber-700 dark:text-amber-400 border-amber-500/30' 
                    : 'text-slate-600 dark:text-slate-400 border-transparent hover:bg-slate-100 dark:hover:bg-slate-800/60';
                
                const element = document.createElement('div');
                element.className = `flex items-center justify-between px-3 py-3 rounded-xl border text-sm font-medium cursor-pointer transition-all duration-150 ${activeClasses}`;
                element.setAttribute('onclick', `selectChat('${chat.id}')`);
                
                element.innerHTML = `
                    <div class="flex items-center gap-2.5 overflow-hidden w-full mr-2">
                        <svg class="w-4 h-4 shrink-0 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
                        <span class="truncate block text-left font-mono text-xs tracking-tight">${escapeHtml(chat.title)}</span>
                    </div>
                    <div class="flex items-center gap-1 shrink-0 opacity-0 group-hover:opacity-100 dynamic-actions">
                        <button onclick="renameChatPrompt('${chat.id}', event)" class="p-1 hover:text-amber-500 rounded transition-colors" title="Rename"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg></button>
                        <button onclick="deleteChat('${chat.id}', event)" class="p-1 hover:text-red-500 rounded transition-colors" title="Purge"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
                    </div>
                `;
                
                // Extra CSS wrapper injection because class inheritance groups
                element.classList.add('group');
                container.appendChild(element);
            });
        }

        function renderActiveChatMessages() {
            const viewport = document.getElementById('chat-viewport');
            viewport.innerHTML = '';
            
            const activeChat = state.chats.find(c => c.id === state.activeChatId);
            if (!activeChat) return;

            activeChat.messages.forEach((msg, idx) => {
                viewport.appendChild(createMessageNode(msg.role, msg.content, idx));
            });
            
            scrollToBottom();
        }

        function createMessageNode(role, text, index) {
            const isUser = role === 'user';
            const wrapper = document.createElement('div');
            wrapper.className = `flex w-full ${isUser ? 'justify-end' : 'justify-start animate-fadeIn'}`;
            
            const innerContainer = document.createElement('div');
            innerContainer.className = `max-w-3xl flex gap-3 md:gap-4 p-4 rounded-2xl ${isUser ? 'bg-amber-500 text-white shadow-md ml-12' : 'bg-white dark:bg-bot-darkPanel border border-slate-100 dark:border-slate-800 shadow-sm mr-12'} transition-all w-fit`;
            
            // Icon Identifier Badge Matrix
            const avatar = document.createElement('div');
            avatar.className = `w-7 h-7 rounded-lg shrink-0 flex items-center justify-center font-mono font-bold text-xs border ${isUser ? 'bg-amber-600 text-white border-amber-400' : 'bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 border-slate-200 dark:border-slate-700'}`;
            avatar.innerText = isUser ? 'OP' : 'AI';

            const contentBlock = document.createElement('div');
            contentBlock.className = `prose dark:prose-invert max-w-none text-sm leading-relaxed tracking-wide ${isUser ? 'text-white' : 'text-slate-800 dark:text-slate-200'}`;
            
            if (isUser) {
                contentBlock.innerText = text;
            } else {
                // Defensive Injection Parsing via Marked library
                try {
                    contentBlock.innerHTML = marked.parse(text);
                } catch (e) {
                    contentBlock.innerText = text; // Fallback text formatting execution
                }
            }

            innerContainer.appendChild(avatar);
            innerContainer.appendChild(contentBlock);
            wrapper.appendChild(innerContainer);
            return wrapper;
        }

        // Network Processing API Pipeline (OpenRouter Stream)
        async function submitMessage() {
            const inputField = document.getElementById('chat-input');
            const promptText = inputField.value.trim();
            if (!promptText) return;

            // Authentication verification gate
            if (!state.apiKey) {
                alert("ACCESS FAULT: Missing OpenRouter Engine Authorization Key. Check Engine Configuration Matrix.");
                openModal('settings-modal');
                return;
            }

            const activeChat = state.chats.find(c => c.id === state.activeChatId);
            if (!activeChat) return;

            // Commit User Input to State
            activeChat.messages.push({ role: 'user', content: promptText });
            
            // Auto-Generate title if default
            if (activeChat.title === 'New Directive Module' && activeChat.messages.length === 2) {
                activeChat.title = promptText.length > 26 ? promptText.substring(0, 26) + '...' : promptText;
            }

            inputField.value = '';
            autoGrowInput(inputField);
            saveChatsToStorage();
            renderSidebarHistory();
            renderActiveChatMessages();

            // Setup AI Response Node Layer Template in state
            const targetMessageIndex = activeChat.messages.length;
            activeChat.messages.push({ role: 'assistant', content: '' });

            const viewport = document.getElementById('chat-viewport');
            const placeholderAiNode = createMessageNode('assistant', '📡 Attaching engine stream...', targetMessageIndex);
            viewport.appendChild(placeholderAiNode);
            scrollToBottom();

            const textContentContainer = placeholderAiNode.querySelector('.prose');

            // Build Network Package Matrix Payload
            const apiMessages = [];
            if(state.systemPrompt) {
                apiMessages.push({ role: 'system', content: state.systemPrompt });
            }
            // Maps and drops local welcome message layers out of remote API context logs
            activeChat.messages.slice(0, -1).forEach(m => {
                if(m.content !== WELCOME_MESSAGE) {
                    apiMessages.push({ role: m.role, content: m.content });
                }
            });

            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${state.apiKey}`,
                        'Content-Type': 'application/json',
                        'HTTP-Referer': window.location.origin,
                        'X-Title': 'Abhi AI Robotics Workspace'
                    },
                    body: JSON.stringify({
                        model: state.model,
                        messages: apiMessages,
                        stream: true
                    })
                });

                if (!response.ok) {
                    const errorDetails = await response.text();
                    throw new Error(`COMMS_FAILURE: STATUS ${response.status} - ${errorDetails}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let streamingBufferText = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        const sanitizedLine = line.replace(/^data:\s*/, '').trim();
                        if (!sanitizedLine || sanitizedLine === '[DONE]') continue;

                        try {
                            const parsedJson = JSON.parse(sanitizedLine);
                            const token = parsedJson.choices?.[0]?.delta?.content || '';
                            if (token) {
                                streamingBufferText += token;
                                // Write to state memory directly
                                activeChat.messages[targetMessageIndex].content = streamingBufferText;
                                // Real-Time Terminal Markdown Rendering Engine Flush
                                textContentContainer.innerHTML = marked.parse(streamingBufferText);
                                scrollToBottom();
                            }
                        } catch (jsonErr) {
                            // Non-critical parsing lines skip safely
                            continue;
                        }
                    }
                }

                // Stream finished successfully. Final Storage Commit
                saveChatsToStorage();

            } catch (networkError) {
                console.error(networkError);
                const stringifiedError = `\n\n\`\`\`\n[SYSTEM CRITICAL MATRIX FAULT]\n${networkError.message}\n\`\`\``;
                activeChat.messages[targetMessageIndex].content += stringifiedError;
                textContentContainer.innerHTML = marked.parse(activeChat.messages[targetMessageIndex].content);
                saveChatsToStorage();
            }
        }

        // Essential Core Utility Architecture Tools
        function scrollToBottom() {
            const viewport = document.getElementById('chat-viewport');
            viewport.scrollTop = viewport.scrollHeight;
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>
