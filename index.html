<!DOCTYPE html>
<html lang="en" class="h-full dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Abhi's AI - Cybernetic Workspace</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Marked.js for Markdown Rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        cyber: {
                            bg: '#000000',        // Absolute Pure Dark Black
                            panel: '#050505',     // Obsidian Matte Black
                            border: '#111827',    // Strict Low-Light Border
                            neon: '#00F0FF',      // Pure High-Output Neon Blue
                            glow: 'rgba(0, 240, 255, 0.2)'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #111827;
            border-radius: 2px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #00F0FF;
        }
        .prose pre {
            background-color: #050505;
            color: #E2E8F0;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            border: 1px solid #111827;
        }
        .prose code {
            font-family: monospace;
            font-size: 0.875rem;
            color: #00F0FF;
        }
        .prose p { margin-bottom: 0.75rem; }
        .prose ul { list-style-type: disc; margin-left: 1.25rem; margin-bottom: 0.75rem; }
        .prose ol { list-style-type: decimal; margin-left: 1.25rem; margin-bottom: 0.75rem; }
        
        .neon-glow {
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.15);
        }
        .neon-border-focus:focus-within {
            border-color: #00F0FF;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.25);
        }

        body {
            min-height: 100vh;
            min-height: -webkit-fill-available;
        }
        html {
            height: -webkit-fill-available;
        }
    </style>
</head>
<body class="bg-cyber-bg text-slate-200 font-sans transition-colors duration-200 flex flex-col antialiased dark">

    <div id="app-root" class="flex flex-1 overflow-hidden relative w-full h-full">
        
        <!-- SIDEBAR (Left Panel) -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-72 bg-cyber-panel border-r border-cyber-border transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col">
            <div class="p-4 border-b border-cyber-border flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <div class="w-2.5 h-2.5 rounded-full bg-cyber-neon animate-pulse shadow-[0_0_8px_#00F0FF]"></div>
                    <span class="font-mono font-bold tracking-wider text-xs text-cyber-neon">SYS_STATUS: ACTIVE</span>
                </div>
                <button onclick="toggleSidebar()" class="md:hidden p-2 rounded-lg hover:bg-neutral-900 text-slate-400">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>

            <div class="p-4">
                <button onclick="createNewChat()" class="w-full flex items-center justify-center gap-2 py-2.5 px-4 rounded-xl bg-transparent border border-cyber-neon text-cyber-neon font-mono text-sm tracking-wide font-medium shadow-[0_0_10px_rgba(0,240,255,0.1)] hover:bg-cyber-neon hover:text-cyber-bg transition-all duration-200 group">
                    <svg class="w-4 h-4 transition-transform group-hover:rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    Assemble New Task
                </button>
            </div>

            <div class="flex-1 overflow-y-auto px-3 space-y-1 custom-scrollbar" id="chat-history-list"></div>

            <div class="p-4 border-t border-cyber-border bg-black/40 space-y-1">
                <button onclick="openModal('settings-modal')" class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-slate-400 hover:text-cyber-neon hover:bg-neutral-900 transition-colors font-mono text-xs">
                    <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    Engine Settings
                </button>
            </div>
        </aside>

        <!-- BACKDROP FOR MOBILE -->
        <div id="sidebar-backdrop" onclick="toggleSidebar()" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-30 hidden md:hidden transition-opacity duration-300"></div>

        <!-- MAIN WORKSPACE -->
        <main class="flex-1 md:pl-72 flex flex-col h-full relative">
            
            <!-- HEADER -->
            <header class="h-14 border-b border-cyber-border bg-cyber-bg/80 backdrop-blur-md flex items-center justify-between px-6 sticky top-0 z-20">
                <div class="flex items-center gap-3">
                    <button onclick="toggleSidebar()" class="md:hidden p-1.5 rounded-lg border border-cyber-border hover:bg-neutral-900 text-slate-300">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                    </button>
                    <div>
                        <h1 class="font-mono font-black text-base tracking-wider text-white flex items-center gap-2">
                            Abhi's AI <span class="text-[10px] py-0.5 px-1.5 bg-cyber-neon/10 text-cyber-neon border border-cyber-neon/20 rounded font-bold">v4.5</span>
                        </h1>
                    </div>
                </div>
            </header>

            <!-- CHAT VIEWPORT -->
            <div id="chat-viewport" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 custom-scrollbar pb-32 max-w-4xl w-full mx-auto">
                <!-- Dynamically injected messages appear here -->
            </div>

            <!-- FIXED BOTTOM INPUT CONSOLE -->
            <div class="absolute bottom-0 inset-x-0 bg-gradient-to-t from-cyber-bg via-cyber-bg/95 to-transparent p-4 md:p-6 z-10">
                <div class="max-w-3xl mx-auto relative">
                    <div class="bg-cyber-panel border border-cyber-border rounded-xl shadow-2xl neon-border-focus transition-all overflow-hidden flex items-end mb-2">
                        <textarea id="chat-input" rows="1" placeholder="Issue operational command..." class="w-full bg-transparent px-4 py-3.5 pr-14 text-sm text-white placeholder-slate-700 focus:outline-none resize-none custom-scrollbar min-h-[48px] max-h-[200px]" oninput="autoGrowInput(this)" onkeydown="handleInputKeydown(event)"></textarea>
                        
                        <div class="absolute right-2.5 bottom-2">
                            <button id="send-btn" onclick="submitMessage()" class="p-2 bg-cyber-neon text-cyber-bg rounded-lg transition-all active:scale-95 disabled:opacity-20 disabled:pointer-events-none shadow-[0_0_10px_rgba(0,240,255,0.2)]" disabled>
                                <svg class="w-4 h-4 transform rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- ENGINE SETTINGS MODAL -->
    <div id="settings-modal" class="fixed inset-0 bg-black/90 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-cyber-panel border border-cyber-border rounded-xl max-w-md w-full p-6 shadow-2xl transition-all transform scale-95 opacity-0 duration-200" id="settings-modal-content">
            <h3 class="text-sm font-mono font-bold border-b border-cyber-border pb-3 mb-4 text-white flex items-center gap-2 tracking-wider">
                <span class="w-2.5 h-2.5 bg-cyber-neon rounded-full shadow-[0_0_6px_#00F0FF]"></span> ENGINE CONFIGURATION
            </h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-mono font-bold uppercase tracking-wider text-neutral-500 mb-1">OpenRouter Access Token</label>
                    <input type="password" id="setting-api-key" placeholder="sk-or-..." class="w-full px-3 py-2 bg-black/60 border border-cyber-border rounded-lg text-sm text-white focus:outline-none focus:border-cyber-neon font-mono">
                </div>
                <div>
                    <label class="block text-[10px] font-mono font-bold uppercase tracking-wider text-neutral-500 mb-1">Processing Model Target</label>
                    <input type="text" id="setting-model" placeholder="deepseek/deepseek-r1:free" class="w-full px-3 py-2 bg-black/60 border border-cyber-border rounded-lg text-sm text-white focus:outline-none focus:border-cyber-neon font-mono">
                </div>
            </div>
            <div class="mt-6 flex justify-end gap-2 text-xs font-mono">
                <button onclick="closeModal('settings-modal')" class="px-4 py-2 border border-cyber-border text-slate-400 rounded-lg hover:bg-neutral-950">Abort</button>
                <button onclick="saveSettings()" class="px-4 py-2 bg-cyber-neon text-cyber-bg font-bold rounded-lg shadow-md">Commit Parameters</button>
            </div>
        </div>
    </div>

    <script>
        let state = {
            chats: [],
            activeChatId: null,
            apiKey: '',
            model: 'deepseek/deepseek-r1:free',
            systemPrompt: 'You are Abhi\'s AI, a hyper-focused, incredibly efficient mechanical operative assistant working inside a busy corporate robotics production workspace. Your style is modern, technical, crisp, highly industrious, slightly robotic yet immensely helpful, optimized for heavy workflows and engineering tasks.',
            sidebarOpen: false
        };

        window.addEventListener('DOMContentLoaded', () => {
            state.apiKey = localStorage.getItem('abhi_ai_api_key') || '';
            state.model = localStorage.getItem('abhi_ai_model') || 'deepseek/deepseek-r1:free';
            
            try {
                const savedChats = localStorage.getItem('abhi_ai_chats');
                state.chats = savedChats ? JSON.parse(savedChats) : [];
            } catch (e) {
                state.chats = [];
            }

            document.documentElement.classList.add('dark');

            document.getElementById('setting-api-key').value = state.apiKey;
            document.getElementById('setting-model').value = state.model;
            
            updateInputState();

            if (state.chats.length === 0) {
                createNewChat();
            } else {
                state.activeChatId = state.chats[0].id;
                renderSidebarHistory();
                renderActiveChatMessages();
            }
        });

        function updateInputState() {
            const input = document.getElementById('chat-input');
            const btn = document.getElementById('send-btn');
            btn.disabled = input.value.trim().length === 0;
        }

        function autoGrowInput(element) {
            element.style.height = 'auto';
            element.style.height = element.scrollHeight + 'px';
            updateInputState();
        }

        function handleInputKeydown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                submitMessage();
            }
        }

        function openModal(modalId) {
            const el = document.getElementById(modalId);
            const content = document.getElementById(`${modalId}-content`);
            el.classList.remove('hidden');
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 50);
        }

        function closeModal(modalId) {
            const el = document.getElementById(modalId);
            const content = document.getElementById(`${modalId}-content`);
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => el.classList.add('hidden'), 200);
        }

        function saveSettings() {
            state.apiKey = document.getElementById('setting-api-key').value.trim();
            state.model = document.getElementById('setting-model').value.trim() || 'deepseek/deepseek-r1:free';
            localStorage.setItem('abhi_ai_api_key', state.apiKey);
            localStorage.setItem('abhi_ai_model', state.model);
            closeModal('settings-modal');
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const backdrop = document.getElementById('sidebar-backdrop');
            if (state.sidebarOpen) {
                sidebar.classList.add('-translate-x-full');
                backdrop.classList.add('hidden');
                state.sidebarOpen = false;
            } else {
                sidebar.classList.remove('-translate-x-full');
                backdrop.classList.remove('hidden');
                state.sidebarOpen = true;
            }
        }

        function createNewChat() {
            const newChat = {
                id: 'chat_' + Date.now(),
                title: 'New Directive Module',
                messages: []
            };
            state.chats.unshift(newChat);
            state.activeChatId = newChat.id;
            saveChatsToStorage();
            renderSidebarHistory();
            renderActiveChatMessages();
            if(state.sidebarOpen) toggleSidebar();
        }

        function selectChat(id) {
            state.activeChatId = id;
            renderSidebarHistory();
            renderActiveChatMessages();
            if(state.sidebarOpen) toggleSidebar();
        }

        function deleteChat(id, event) {
            event.stopPropagation();
            state.chats = state.chats.filter(c => c.id !== id);
            if (state.chats.length === 0) {
                createNewChat();
            } else if (state.activeChatId === id) {
                state.activeChatId = state.chats[0].id;
            }
            saveChatsToStorage();
            renderSidebarHistory();
            renderActiveChatMessages();
        }

        function renameChatPrompt(id, event) {
            event.stopPropagation();
            const targetChat = state.chats.find(c => c.id === id);
            if (!targetChat) return;
            const newTitle = prompt("Update module tag descriptor:", targetChat.title);
            if(newTitle && newTitle.trim().length > 0) {
                targetChat.title = newTitle.trim();
                saveChatsToStorage();
                renderSidebarHistory();
            }
        }

        function saveChatsToStorage() {
            localStorage.setItem('abhi_ai_chats', JSON.stringify(state.chats));
        }

        function renderSidebarHistory() {
            const container = document.getElementById('chat-history-list');
            container.innerHTML = '';

            state.chats.forEach(chat => {
                const isActive = chat.id === state.activeChatId;
                const activeClasses = isActive 
                    ? 'bg-cyber-neon/5 text-cyber-neon border-cyber-neon/30' 
                    : 'text-slate-400 border-transparent hover:bg-neutral-900 hover:text-slate-200';
                
                const element = document.createElement('div');
                element.className = `flex items-center justify-between px-3 py-2.5 rounded-lg border text-sm font-medium cursor-pointer transition-all duration-150 ${activeClasses}`;
                element.setAttribute('onclick', `selectChat('${chat.id}')`);
                
                element.innerHTML = `
                    <div class="flex items-center gap-2 overflow-hidden w-full mr-2">
                        <svg class="w-3.5 h-3.5 shrink-0 opacity-50 text-cyber-neon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
                        <span class="truncate block text-left font-mono text-[11px] tracking-tight">${escapeHtml(chat.title)}</span>
                    </div>
                    <div class="flex items-center gap-1 shrink-0 opacity-0 group-hover:opacity-100">
                        <button onclick="renameChatPrompt('${chat.id}', event)" class="p-0.5 text-neutral-500 hover:text-cyber-neon transition-colors"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg></button>
                        <button onclick="deleteChat('${chat.id}', event)" class="p-0.5 text-neutral-500 hover:text-red-400 transition-colors"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
                    </div>
                `;
                
                element.classList.add('group');
                container.appendChild(element);
            });
        }

        function renderActiveChatMessages() {
            const viewport = document.getElementById('chat-viewport');
            viewport.innerHTML = '';
            
            const activeChat = state.chats.find(c => c.id === state.activeChatId);
            if (!activeChat) return;

            activeChat.messages.forEach((msg, idx) => {
                viewport.appendChild(createMessageNode(msg.role, msg.content, idx));
            });
            
            scrollToBottom();
        }

        function createMessageNode(role, text, index) {
            const isUser = role === 'user';
            const wrapper = document.createElement('div');
            wrapper.className = `flex w-full ${isUser ? 'justify-end' : 'justify-start'}`;
            
            const innerContainer = document.createElement('div');
            innerContainer.className = `max-w-2xl flex gap-4 p-4 rounded-xl border ${isUser ? 'bg-cyber-neon/5 text-slate-200 border-cyber-neon/20 ml-12' : 'bg-cyber-panel border-cyber-border mr-12'} w-fit`;
            
            const avatar = document.createElement('div');
            avatar.className = `w-6 h-6 rounded flex items-center justify-center font-mono font-bold text-[10px] tracking-tighter border ${isUser ? 'bg-cyber-neon/10 text-cyber-neon border-cyber-neon/30' : 'bg-neutral-900 text-slate-400 border-cyber-border'}`;
            avatar.innerText = isUser ? 'OP' : 'AI';

            const contentBlock = document.createElement('div');
            contentBlock.className = `prose prose-invert max-w-none text-sm leading-relaxed tracking-wide text-slate-300`;
            
            if (isUser) {
                contentBlock.innerText = text;
            } else {
                try {
                    contentBlock.innerHTML = marked.parse(text);
                } catch (e) {
                    contentBlock.innerText = text;
                }
            }

            innerContainer.appendChild(avatar);
            innerContainer.appendChild(contentBlock);
            wrapper.appendChild(innerContainer);
            return wrapper;
        }

        async function submitMessage() {
            const inputField = document.getElementById('chat-input');
            const promptText = inputField.value.trim();
            if (!promptText) return;

            if (!state.apiKey) {
                alert("ACCESS FAULT: Missing OpenRouter Authentication Engine Key.");
                openModal('settings-modal');
                return;
            }

            const activeChat = state.chats.find(c => c.id === state.activeChatId);
            if (!activeChat) return;

            activeChat.messages.push({ role: 'user', content: promptText });
            
            if (activeChat.title === 'New Directive Module' && activeChat.messages.length === 1) {
                activeChat.title = promptText.length > 26 ? promptText.substring(0, 26) + '...' : promptText;
            }

            inputField.value = '';
            autoGrowInput(inputField);
            saveChatsToStorage();
            renderSidebarHistory();
            renderActiveChatMessages();

            const targetMessageIndex = activeChat.messages.length;
            activeChat.messages.push({ role: 'assistant', content: '' });

            const viewport = document.getElementById('chat-viewport');
            const placeholderAiNode = createMessageNode('assistant', '📡 Attaching engine stream...', targetMessageIndex);
            viewport.appendChild(placeholderAiNode);
            scrollToBottom();

            const textContentContainer = placeholderAiNode.querySelector('.prose');

            const apiMessages = [];
            if(state.systemPrompt) {
                apiMessages.push({ role: 'system', content: state.systemPrompt });
            }
            activeChat.messages.slice(0, -1).forEach(m => {
                apiMessages.push({ role: m.role, content: m.content });
            });

            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${state.apiKey}`,
                        'Content-Type': 'application/json',
                        'HTTP-Referer': window.location.origin,
                        'X-Title': 'Abhi AI Architecture'
                    },
                    body: JSON.stringify({
                        model: state.model,
                        messages: apiMessages,
                        stream: true
                    })
                });

                if (!response.ok) {
                    const errorDetails = await response.text();
                    throw new Error(`COMMS_FAILURE: STATUS ${response.status} - ${errorDetails}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let streamingBufferText = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        const sanitizedLine = line.replace(/^data:\s*/, '').trim();
                        if (!sanitizedLine || sanitizedLine === '[DONE]') continue;

                        try {
                            const parsedJson = JSON.parse(sanitizedLine);
                            const token = parsedJson.choices?.[0]?.delta?.content || '';
                            if (token) {
                                streamingBufferText += token;
                                activeChat.messages[targetMessageIndex].content = streamingBufferText;
                                textContentContainer.innerHTML = marked.parse(streamingBufferText);
                                scrollToBottom();
                            }
                        } catch (jsonErr) {
                            continue;
                        }
                    }
                }
                saveChatsToStorage();
            } catch (networkError) {
                console.error(networkError);
                const stringifiedError = `\n\n\`\`\`\n[SYSTEM CRITICAL MATRIX FAULT]\n${networkError.message}\n\`\`\``;
                activeChat.messages[targetMessageIndex].content += stringifiedError;
                textContentContainer.innerHTML = marked.parse(activeChat.messages[targetMessageIndex].content);
                saveChatsToStorage();
            }
        }

        function scrollToBottom() {
            const viewport = document.getElementById('chat-viewport');
            viewport.scrollTop = viewport.scrollHeight;
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
